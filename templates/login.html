<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>riffd</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:#0B0B0B; color:#F5F5F5; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      -webkit-font-smoothing:antialiased;
    }
    .login-card {
      width:100%; max-width:360px; padding:48px 36px;
      background:#0D0D0D; border:1px solid rgba(255,255,255,0.08);
    }
    .logo {
      font-size:1.125rem; font-weight:500; letter-spacing:-0.02em;
      color:#F5F5F5; text-align:center; margin-bottom:36px;
    }
    .field { margin-bottom:20px; }
    .field input {
      width:100%; padding:14px 16px; font-size:0.9375rem; font-family:inherit;
      background:transparent; border:1px solid rgba(255,255,255,0.15);
      color:#F5F5F5; outline:none; letter-spacing:-0.01em;
      transition:border-color .2s;
    }
    .field input:focus { border-color:rgba(255,255,255,0.30); }
    .field input::placeholder { color:rgba(245,245,245,0.35); }
    .submit-btn {
      width:100%; padding:14px; font-size:0.9375rem; font-weight:500; font-family:inherit;
      background:#FAFAF9; color:black; border:none; cursor:pointer;
      letter-spacing:-0.01em; transition:transform .1s;
    }
    .submit-btn:hover { transform:translateY(-0.5px); }
    .submit-btn:active { transform:translateY(0); }
    .error {
      color:#f87171; font-size:0.8125rem; text-align:center; margin-bottom:16px;
    }
  </style>
</head>
<body>
  <form class="login-card" method="POST" action="/login">
    <div class="logo">riffd</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="field">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
    </div>
    <button type="submit" class="submit-btn">Enter</button>
  </form>
  <div style="position:fixed;bottom:6px;right:8px;font-size:.5rem;color:rgba(255,255,255,.1);font-family:monospace;pointer-events:none">auth-v2</div>
</body>
</html>
