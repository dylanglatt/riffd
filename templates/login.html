<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riffd</title>
  <style>
    :root {
      --bg: #05060a; --surface: #11131c; --surface-2: #171926;
      --border: rgba(255,255,255,0.06); --border-2: rgba(255,255,255,0.09);
      --accent: #7c5cff; --accent-2: #5eead4;
      --accent-gradient: linear-gradient(135deg, #7c5cff, #5eead4);
      --text-primary: #f5f7ff; --text-secondary: #9aa0b5; --text-muted: #6b7085;
      --red: #f87171;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg); color:var(--text-primary); min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      -webkit-font-smoothing:antialiased;
    }
    body::before {
      content:""; position:fixed; top:-30%; left:50%; transform:translateX(-50%);
      width:600px; height:500px;
      background:radial-gradient(ellipse,rgba(124,92,255,0.06) 0%,rgba(94,234,212,0.03) 40%,transparent 70%);
      pointer-events:none;
    }
    .login-card {
      position:relative; width:100%; max-width:360px; padding:40px 32px;
      background:rgba(17,19,28,0.7); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border:1px solid var(--border); border-radius:16px;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      font-size:1.2rem; font-weight:800; letter-spacing:-0.04em; text-align:center;
      background:var(--accent-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:28px;
    }
    .field { margin-bottom:16px; }
    .field input {
      width:100%; padding:12px 16px; font-size:.9rem; font-family:inherit;
      background:rgba(255,255,255,0.04); border:1px solid var(--border-2);
      border-radius:10px; color:var(--text-primary); outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus {
      border-color:rgba(124,92,255,.4);
      box-shadow:0 0 0 3px rgba(124,92,255,0.12);
    }
    .field input::placeholder { color:var(--text-muted); }
    .submit-btn {
      width:100%; padding:12px; font-size:.88rem; font-weight:600; font-family:inherit;
      background:var(--accent-gradient); color:white; border:none; border-radius:10px;
      cursor:pointer; box-shadow:0 4px 16px rgba(124,92,255,0.3);
      transition:box-shadow .2s, transform .1s;
    }
    .submit-btn:hover { box-shadow:0 6px 24px rgba(124,92,255,0.45); transform:translateY(-1px); }
    .submit-btn:active { transform:translateY(0); }
    .error {
      color:var(--red); font-size:.78rem; text-align:center; margin-bottom:14px;
    }
  </style>
</head>
<body>
  <form class="login-card" method="POST" action="/login">
    <div class="logo">Riffd</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="field">
      <input type="password" name="password" placeholder="Password" autofocus autocomplete="current-password" />
    </div>
    <button type="submit" class="submit-btn">Enter</button>
  </form>
  <!-- TEMP: deploy marker -->
  <div style="position:fixed;bottom:6px;right:8px;font-size:.5rem;color:rgba(255,255,255,.1);font-family:monospace;pointer-events:none">auth-v2</div>
</body>
</html>
