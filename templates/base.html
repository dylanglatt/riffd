<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{% block title %}riffd{% endblock %} | Break Down Real Songs</title>
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon-192.png" />
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="shortcut icon" href="/static/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <meta name="description" content="Break down real songs. Key detection, stem separation, AI-powered musical insight, and an interactive mixer — all in one place." />
  <meta property="og:title" content="riffd | Break Down Real Songs" />
  <meta property="og:description" content="Break down real songs. Key detection, stem separation, AI-powered musical insight, and an interactive mixer — all in one place." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://riffdlabs.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="riffd | Break Down Real Songs" />
  <meta name="twitter:description" content="Break down real songs. Key detection, stem separation, AI-powered musical insight, and an interactive mixer — all in one place." />
  <style>
    :root {
      --bg: #0B0B0B; --bg-soft: #0D0D0D; --surface: #0D0D0D; --surface-2: #141414;
      --surface-3: #1a1a1a; --surface-4: #222222;
      --border: rgba(255,255,255,0.08); --border-2: rgba(255,255,255,0.15);
      --accent: #D4691F; --accent-dim: #8A4513;
      --text-primary: #F5F5F5; --text-secondary: rgba(245,245,245,0.55); --text-muted: rgba(245,245,245,0.35);
      --text-label: rgba(245,245,245,0.4);
      --red: #f87171; --yellow: #fbbf24;
      --radius: 0; --radius-sm: 0; --radius-xs: 0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; overflow-x: hidden; padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
    /* Ensure touch targets meet 44px minimum */
    @media(pointer:coarse) { button, .ch-btn, .tool-btn, .transport-btn, .results-nav-btn, .new-song-btn, .stem-cta-btn { min-height:44px; } }
    body::before { content:""; position:fixed; top:-120px; left:50%; transform:translateX(-50%); width:900px; height:500px; background:radial-gradient(ellipse at center, rgba(212,105,31,0.045) 0%, transparent 70%); pointer-events:none; z-index:0; }

    /* ═══ Global Nav ═══ */
    .global-nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; align-items:center;
      border-bottom:1px solid rgba(255,255,255,0.08);
      background:#0B0B0B;
    }
    .global-nav-inner {
      max-width:1280px; width:100%; margin:0 auto; padding:20px 32px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .nav-logo {
      font-size:1.125rem; font-weight:500; letter-spacing:-0.02em;
      color:#F5F5F5; text-decoration:none; display:flex; align-items:center; gap:8px;
    }
    .nav-logo-beta {
      font-size:0.625rem; font-weight:400; color:rgba(245,245,245,0.2); letter-spacing:0.02em;
    }
    .nav-links { display:flex; align-items:center; gap:32px; }
    .nav-link {
      display:inline-flex; align-items:center; gap:6px;
      font-size:0.9375rem; font-weight:400; color:rgba(245,245,245,0.5);
      text-decoration:none; letter-spacing:-0.01em;
      transition:color .2s;
    }
    .nav-link:hover { color:rgba(245,245,245,0.7); }
    .nav-link.active { color:#F5F5F5; }
    .nav-badge {
      font-size:0.625rem; font-weight:400; color:rgba(245,245,245,0.25); letter-spacing:0.02em;
    }

    /* ═══ Page shell ═══ */
    .page-body { position:relative; z-index:1; min-height:100vh; padding-top:68px; }
    .page-content { max-width:1280px; margin:0 auto; padding:0 32px 80px; }
    .page-content.wide { max-width:1280px; }

    /* ═══ Beta message ═══ */
    .beta-msg {
      font-size:0.75rem; font-weight:400; letter-spacing:-0.01em;
      color:rgba(245,245,245,0.25); margin-bottom:8px;
    }

    /* ═══ Common components ═══ */
    .card { border:1px solid rgba(255,255,255,0.08); background:transparent; }
    button { border:none; border-radius:0; padding:14px 28px; font-size:0.9375rem; font-weight:500; cursor:pointer; transition:all .15s ease; font-family:inherit; letter-spacing:-0.01em; }
    button:hover { transform:translateY(-0.5px); } button:active { transform:translateY(0); } button:disabled { opacity:.3; cursor:not-allowed; transform:none; }
    .primary { background:#FAFAF9; color:black; }
    .primary:hover { background:#FAFAF9; }
    .secondary { background:transparent; color:#F5F5F5; border:1px solid rgba(255,255,255,0.15); }
    .secondary:hover { border-color:rgba(255,255,255,0.30); }
    .ghost { background:transparent; color:#F5F5F5; border:1px solid rgba(255,255,255,0.15); }
    .ghost:hover { border-color:rgba(255,255,255,0.30); }

    /* ═══ Section headings ═══ */
    .section-title { font-size:2rem; font-weight:500; letter-spacing:-0.03em; margin-bottom:8px; color:#F5F5F5; }
    .section-sub { color:rgba(245,245,245,0.55); font-size:1.125rem; line-height:1.7; margin-bottom:32px; letter-spacing:-0.01em; font-weight:400; max-width:680px; }
    .section-label { font-size:0.8125rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:rgba(245,245,245,0.4); margin-bottom:48px; }

    /* ═══ Footer ═══ */
    .site-footer { margin-top:128px; padding:64px 0; border-top:1px solid rgba(255,255,255,0.08); }
    .site-footer-inner { max-width:1280px; margin:0 auto; padding:0 32px; display:flex; flex-direction:column; align-items:center; gap:24px; }
    .footer-links { display:flex; gap:40px; }
    .footer-links a { color:rgba(245,245,245,0.35); text-decoration:none; font-size:0.875rem; font-weight:400; letter-spacing:-0.01em; transition:color .2s; }
    .footer-links a:hover { color:#F5F5F5; }
    .footer-note { color:rgba(245,245,245,0.35); font-size:0.875rem; font-weight:400; letter-spacing:-0.01em; }

    /* ═══ Responsive ═══ */
    @media(max-width:768px) {
      .global-nav-inner { padding:14px 16px; }
      .nav-logo { font-size:1rem; }
      .nav-links { gap:16px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
      .nav-link { font-size:.82rem; white-space:nowrap; flex-shrink:0; }
      .page-body { padding-top:56px; }
      .page-content { padding:0 16px 48px; }
      .section-title { font-size:1.5rem; }
      .section-sub { font-size:.95rem; }
    }
    @media(max-width:480px) {
      .global-nav-inner { max-width:100vw; overflow-x:auto; }
      .nav-links { gap:12px; }
      .nav-link { font-size:.76rem; }
      .nav-badge { font-size:.6rem; }
      .page-content { padding:0 12px 40px; }
    }
    @media(max-width:360px) {
      .global-nav-inner { padding:12px 12px; }
      .nav-logo { font-size:0.875rem; }
      .nav-logo-beta { display:none; }
      .nav-links { gap:8px; }
      .nav-link { font-size:0.6875rem; }
      .nav-badge { font-size:0.5rem; }
      .page-body { padding-top:48px; }
      .page-content { padding:0 10px 32px; }
      .section-title { font-size:1.25rem; }
      .section-sub { font-size:0.875rem; }
    }
    /* iOS safe area for bottom fixed elements and footer */
    @supports(padding-bottom: env(safe-area-inset-bottom)) {
      .new-song-row, .results-panel { padding-bottom: calc(24px + env(safe-area-inset-bottom)); }
    }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<!-- Global Navigation -->
<nav class="global-nav">
  <div class="global-nav-inner">
    <a href="/" class="nav-logo">riffd</a>
    <div class="nav-links">
      <a href="/decompose" class="nav-link {% if active_page == 'decompose' %}active{% endif %}">Analyze</a>
      <a href="/learn" class="nav-link {% if active_page == 'learn' %}active{% endif %}">Theory</a>
      <a href="/about" class="nav-link {% if active_page == 'about' %}active{% endif %}">About</a>
    </div>
  </div>
</nav>

<div class="page-body">
  {% block body %}{% endblock %}
</div>

{% block extra_js %}{% endblock %}

</body>
</html>
